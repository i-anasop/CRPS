<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Amber rounded square background -->
  <rect width="32" height="32" rx="7" fill="#f59e0b"/>
  <!-- Globe: outer circle -->
  <circle cx="16" cy="16" r="9.5" stroke="#000" stroke-width="1.6" fill="none"/>
  <!-- Globe: vertical longitude ellipse -->
  <ellipse cx="16" cy="16" rx="4.5" ry="9.5" stroke="#000" stroke-width="1.2" fill="none"/>
  <!-- Globe: horizontal equator line -->
  <line x1="6.5" y1="16" x2="25.5" y2="16" stroke="#000" stroke-width="1.2"/>
  <!-- Globe: center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#000"/>
</svg>
